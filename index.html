<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sp4r4nj1t - Portfolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0005;
            font-family: 'Courier New', monospace;
            overflow-x: hidden;
            color: #fff;
        }

        #flameCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        #intro {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            transition: opacity 0.8s ease;
            background: #0a0005;
        }

        #intro h1 {
            position: relative;
            z-index: 1;
            font-size: 42px;
            font-weight: 400;
            letter-spacing: 10px;
            text-transform: uppercase;
            animation: fireText 2s ease-in-out infinite, blink 2s ease-in-out infinite;
            background: linear-gradient(180deg, #fff 0%, #ffcc00 30%, #ff6600 60%, #cc0033 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 12px #ff4400) drop-shadow(0 0 30px #9900cc);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        @keyframes fireText {
            0%, 100% { filter: drop-shadow(0 0 8px #ff4400) drop-shadow(0 0 20px #9900cc); }
            50% { filter: drop-shadow(0 0 20px #ff6600) drop-shadow(0 0 40px #cc00ff); }
        }

        #intro.hidden { opacity: 0; pointer-events: none; }

        #main {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        #main.visible { opacity: 1; pointer-events: all; }

        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px 40px;
            border-bottom: 1px solid #2a0020;
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid #cc0033;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(204,0,51,0.6), 0 0 50px rgba(153,0,204,0.3);
            animation: avatarPulse 3s ease-in-out infinite;
        }

        @keyframes avatarPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(204,0,51,0.6), 0 0 50px rgba(153,0,204,0.3); }
            50% { box-shadow: 0 0 35px rgba(255,50,0,0.8), 0 0 80px rgba(200,0,255,0.5); }
        }

        .avatar img { width: 100%; height: 100%; object-fit: cover; object-position: top; }

        .name {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 4px;
            margin-bottom: 12px;
            background: linear-gradient(180deg, #fff 0%, #ffaa00 40%, #ff3300 70%, #aa00cc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fireText 2.5s ease-in-out infinite;
        }

        .ceo-badge {
            display: inline-block;
            background: rgba(180,0,50,0.15);
            border: 1px solid rgba(200,0,80,0.4);
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 12px;
            color: #ff6688;
            letter-spacing: 2px;
            text-decoration: none;
            margin-bottom: 16px;
            transition: all 0.3s;
        }

        .ceo-badge:hover {
            background: rgba(180,0,50,0.3);
            border-color: #ff3366;
            box-shadow: 0 0 15px rgba(255,0,80,0.4);
        }

        .bio {
            background: rgba(80,0,30,0.3);
            border: 1px solid #2a0015;
            border-radius: 12px;
            padding: 20px 24px;
            max-width: 500px;
            text-align: center;
            color: #ccc;
            font-size: 14px;
            line-height: 1.6;
            letter-spacing: 1px;
        }

        .section {
            padding: 40px 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 12px;
            letter-spacing: 4px;
            color: #660022;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .card {
            background: rgba(40,0,20,0.6);
            border: 1px solid #330010;
            border-radius: 12px;
            padding: 18px 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s;
            animation: cardPulse 4s ease-in-out infinite;
        }

        @keyframes cardPulse {
            0%, 100% { box-shadow: 0 0 0px transparent; border-color: #330010; }
            50% { box-shadow: 0 0 15px rgba(180,0,60,0.3), 0 0 30px rgba(100,0,150,0.15); border-color: #660033; }
        }

        .card:hover {
            border-color: #cc0033;
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(204,0,51,0.5), 0 0 50px rgba(150,0,200,0.25) !important;
            animation: none;
        }

        .card-icon {
            width: 48px; height: 48px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .card-icon.discord { background: #5865F2; }
        .card-icon.minecraft { background: #2d6a2d; }
        .card-icon.bot { background: #880022; }
        .card-icon.vortex { background: linear-gradient(135deg, #cc0033, #6600aa); }

        .card-info { flex: 1; }

        .card-title { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: 1px; }
        .card-sub { font-size: 12px; color: #884455; margin-top: 4px; }

        .card-badge {
            font-size: 11px;
            background: rgba(150,0,40,0.2);
            border: 1px solid #440011;
            border-radius: 20px;
            padding: 4px 10px;
            color: #ff4466;
        }

        #subpage {
            display: none;
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        #subpage.visible { display: block; }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #ff4466;
            cursor: pointer;
            font-size: 13px;
            letter-spacing: 2px;
            margin-bottom: 30px;
            border: none;
            background: none;
            text-transform: uppercase;
            font-family: 'Courier New', monospace;
        }

        .sub-title {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 4px;
            margin-bottom: 24px;
            background: linear-gradient(90deg, #ff3300, #cc00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fireText 2s ease-in-out infinite;
        }

        .file-card {
            background: rgba(40,0,20,0.6);
            border: 1px solid #330010;
            border-radius: 12px;
            padding: 18px 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.3s;
            animation: cardPulse 4s ease-in-out infinite;
        }

        .file-card:hover {
            border-color: #cc0033;
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(204,0,51,0.5), 0 0 50px rgba(150,0,200,0.2) !important;
            animation: none;
        }

        .file-icon {
            width: 44px; height: 44px;
            border-radius: 8px;
            background: rgba(150,0,40,0.2);
            border: 1px solid #440011;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .file-name { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: 1px; }
        .file-sub { font-size: 12px; color: #884455; margin-top: 3px; }

        #filepage {
            display: none;
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        #filepage.visible { display: block; }

        .editor { max-width: 600px; margin: 0 auto; }

        .editor-content {
            width: 100%;
            min-height: 200px;
            background: rgba(40,0,20,0.6);
            border: 1px solid #330010;
            border-radius: 12px;
            padding: 20px;
            color: #ccc;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.7;
            white-space: pre-wrap;
        }

        .views {
            text-align: center;
            padding: 30px 20px;
            color: #330010;
            font-size: 13px;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-top: 1px solid #1a0008;
        }

        .views span { color: #ff4466; }
    </style>
</head>

<script>
    // FLAME CANVAS
    const canvas = document.getElementById('flameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

    const particles = [];
    const COLORS = ['#ff0000','#ff2200','#ff4400','#ff6600','#ff8800','#cc00aa','#aa00cc','#8800ff','#ff3399'];

    for (let i = 0; i < 80; i++) {
        particles.push({
            x: Math.random() * window.innerWidth,
            y: window.innerHeight + Math.random() * 200,
            size: Math.random() * 4 + 1,
            speedY: Math.random() * 2.5 + 1,
            speedX: (Math.random() - 0.5) * 1.2,
            life: Math.random(),
            color: COLORS[Math.floor(Math.random() * COLORS.length)],
            wave: Math.random() * Math.PI * 2
        });
    }

    function animateFlames() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
            p.wave += 0.05;
            p.x += Math.sin(p.wave) * 0.8 + p.speedX;
            p.y -= p.speedY;
            p.life -= 0.008;
            if (p.life <= 0 || p.y < -20) {
                p.x = Math.random() * canvas.width;
                p.y = canvas.height + 10;
                p.life = 1;
                p.color = COLORS[Math.floor(Math.random() * COLORS.length)];
            }
            ctx.save();
            ctx.globalAlpha = p.life * 0.5;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.shadowColor = p.color;
            ctx.shadowBlur = 12;
            ctx.fill();
            ctx.restore();
        });
        requestAnimationFrame(animateFlames);
    }
    animateFlames();

    // LOGIC
    const discordFiles = [
        { name: "Ticket System", icon: "🎫", sub: "Ticket system for Discord" },
        { name: "Verify System", icon: "✅", sub: "User verification system" },
        { name: "Welcome System", icon: "👋", sub: "Welcome system for new members" }
    ];

    const fileContents = {
        "Ticket System": "// Ticket System\n// Contenuto in arrivo...",
        "Verify System": "// Verify System\n// Contenuto in arrivo...",
        "Welcome System": "// Welcome System\n// Contenuto in arrivo..."
    };

    let currentSub = '';
    let views = parseInt(localStorage.getItem('portfolio_views') || '0') + 1;
    localStorage.setItem('portfolio_views', views);
    document.getElementById('viewCount').textContent = views;

    function enter() {
        document.getElementById('intro').classList.add('hidden');
        document.getElementById('main').classList.add('visible');
    }

    function openSub(type) {
        currentSub = type;
        document.getElementById('main').style.display = 'none';
        document.getElementById('subpage').classList.add('visible');
        if (type === 'discord') {
            document.getElementById('subTitle').textContent = 'Python Bot Code';
        } else {
            document.getElementById('subTitle').textContent = 'Minecraft Plugins';
        }
        document.getElementById('subCards').innerHTML = '<div style="color:#660022;font-size:13px;letter-spacing:2px;padding:40px 0;text-align:center;">COMING SOON...</div>';
    }

    function openFile(name) {
        document.getElementById('subpage').classList.remove('visible');
        document.getElementById('filepage').classList.add('visible');
        document.getElementById('fileTitle').textContent = name;
        document.getElementById('fileContent').textContent = fileContents[name] || '';
    }

    function goBack(to) {
        if (to === 'main') {
            document.getElementById('subpage').classList.remove('visible');
            document.getElementById('main').style.display = '';
            document.getElementById('main').classList.add('visible');
        } else {
            document.getElementById('filepage').classList.remove('visible');
            document.getElementById('subpage').classList.add('visible');
        }
    }
</script>
